name: Release (Python)

on:
  push:
    tags: ['math-speak-v*.*.*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*-v}"
          TOOL="${TAG%-v*}"
          echo "tool=$TOOL"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Assemble tarball
        run: |
          TOOL="${{ steps.parse.outputs.tool }}"
          VERSION="${{ steps.parse.outputs.version }}"
          DIR="${TOOL}-${VERSION}"

          rsync -a \
            --exclude='.venv/' \
            --exclude='node/node_modules/' \
            --exclude='build/' \
            --exclude='dist/' \
            --exclude='*.egg-info/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='.ruff_cache/' \
            --exclude='*.pyc' \
            --exclude='*.wav' \
            "${TOOL}/" "${DIR}/"

          tar czf "${TOOL}-${VERSION}.tar.gz" "${DIR}/"
          rm -rf "${DIR}"

      - name: Build release notes
        run: |
          TOOL="${{ steps.parse.outputs.tool }}"
          VERSION="${{ steps.parse.outputs.version }}"

          DESC=$(awk '/^## /{exit} /^# [^#]/{found=1; next} found && /^[^[:space:]]/{print; exit}' "${TOOL}/README.md")

          cat > release_body.md <<NOTES
          ## ${TOOL} v${VERSION}

          ${DESC}

          ## Install

          \`\`\`bash
          curl -LO https://github.com/Gofer59/tools/releases/download/${TOOL}-v${VERSION}/${TOOL}-${VERSION}.tar.gz
          tar xzf ${TOOL}-${VERSION}.tar.gz
          cd ${TOOL}-${VERSION}
          bash install.sh
          \`\`\`
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TOOL="${{ steps.parse.outputs.tool }}"
          VERSION="${{ steps.parse.outputs.version }}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "${TOOL} v${VERSION}" \
            --notes-file release_body.md \
            "${TOOL}-${VERSION}.tar.gz"
